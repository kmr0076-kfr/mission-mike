<title>Mission Mike</title>
<style>
  :root { --bg:#0d0b12; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body {
    margin:0; height:100%; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:-apple-system,"Helvetica Neue",Arial,sans-serif; color:#cfc9da;
    overflow:hidden; touch-action:none;
  }
  #wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
  canvas {
    image-rendering:auto;
    background:#101826; border:2px solid #2a2436; border-radius:10px;
    box-shadow:0 12px 50px rgba(0,0,0,.6); cursor:pointer;
  }
  #hint { font-size:12px; opacity:.5; letter-spacing:.3px; text-align:center; max-width:720px; }
  #hint b { color:#9be0a8; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="300"></canvas>
  <div id="hint">click a station &rarr; carry the plate to a guest before their bar runs out &middot; <b>M</b> mute &middot; <b>E</b> eat your plate (sober up) &middot; ride the green <b>TIPSY</b> band for max points</div>
</div>
<script>
/* =========================================================================
   MISSION MIKE - personal pixel-art-spirit backyard-BBQ survival game
   Single self-contained file. No build, no server, no assets, no network.
   Emoji sprites on a clean illustrated backyard. The whole game is one
   mechanic: the drunk meter is a push-your-luck dial you WANT to ride.
   Tipsy (40-74) = faster + bigger multiplier. 100 = Mike face-plants.
   ========================================================================= */

/* ---------- 0. setup & helpers ---------------------------------------- */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 360, H = 300;                     // logical game size (drawing coords)
const PLAY_TOP = 32;                        // HUD strip occupies 0..PLAY_TOP

const clamp = (v,a,b) => v < a ? a : v > b ? b : v;
const lerp  = (a,b,t) => a + (b-a)*t;
const rand  = (a,b) => a + Math.random()*(b-a);
const dist  = (ax,ay,bx,by) => Math.hypot(ax-bx, ay-by);

// crisp high-DPI canvas: backing store scales with the display + pixel ratio,
// while all drawing stays in logical W x H coords (see render()).
function fitCanvas(){
  const cssW = Math.min(window.innerWidth*0.94, 760);
  const cssH = cssW * (H/W);
  const dpr  = Math.min(window.devicePixelRatio||1, 3);
  canvas.style.width = cssW+'px'; canvas.style.height = cssH+'px';
  canvas.width  = Math.round(cssW*dpr);
  canvas.height = Math.round(cssH*dpr);
  ctx.imageSmoothingEnabled = true;
}
window.addEventListener('resize', fitCanvas);

/* ---------- 1. config / constants ------------------------------------- */
const CFG = {
  mikeSpeed:   58,    // px/sec base walk speed (scaled by drunk band)
  beerAmt:     6,     // drunkenness added per passive beer
  beerInterval:7.2,   // seconds between passive beers (shrinks w/ difficulty)
  pts: { make:10, serve:55, party:130, beerRun:18, dog:30, toast:80 },
  comboWindow: 4.0,   // seconds to chain a combo before it decays
  coffeeCD:    7.0,   // coffee cooldown so it can't be spammed
  sober: { coffee:26, water:11, eat:16 },
  arrive: 14,         // arrival radius for stations/guests
};

/* drunk bands ----------------------------------------------------------- */
function band(d){ return d<40 ? 'sober' : d<75 ? 'tipsy' : d<100 ? 'hammered' : 'out'; }
function speedFactor(d){ const b=band(d); return b==='tipsy'?1.25 : b==='hammered'?1.08 : 1.0; }
function drunkMult(d){ return d<40 ? 1.0 : d<75 ? 1.0 + (d-40)/35 : 2.0; }
function jitter(d){ return d<40 ? 0 : d<75 ? (d-40)/35*0.35 : 0.35 + (d-75)/25*0.65; }

const EMOJI_IMG={}; for(const k in EMOJI_PNG){ const im=new Image(); im.src=EMOJI_PNG[k]; EMOJI_IMG[k]=im; }
function emoji(ch,x,y,size){ const im=EMOJI_IMG[ch]; if(im&&im.complete&&im.naturalWidth){ ctx.drawImage(im,x-size/2,y-size/2,size,size); return; } ctx.fillStyle='#3a3a44'; ctx.font=size+'px '+EMOJI; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(ch,x,y); }
function uiText(t,x,y,size,color,align,weight){ ctx.fillStyle=color; ctx.textAlign=align||'left'; ctx.textBaseline='alphabetic'; ctx.font=(weight||'600')+' '+size+'px '+SANS; ctx.fillText(t,x,y); }
function rrect(x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function shadowEllipse(cx,cy,rw,rh,a){ ctx.fillStyle='rgba(0,0,0,'+(a==null?0.18:a)+')'; ctx.beginPath(); ctx.ellipse(cx,cy,rw,rh,0,0,Math.PI*2); ctx.fill(); }

/* ---------- 4. game state --------------------------------------------- */
let state;
function newState(){
  return {
    phase:'menu',                          // menu | playing | gameover
    t:0,                                   // run time (s)
    mike:{ x:180, y:175, tx:180, ty:175, facing:1, walkPhase:0, lean:0, carrying:null, moving:false },
    drunk:0,
    beerTimer:CFG.beerInterval,
    score:0, tasksDone:0,
    comboCount:0, comboTimer:0,
    target:null,                           // {kind, ref}
    minigame:null,
    guests:[], guestTimer:3,
    dog:null,
    coffeeCD:0,
    boysTimer:0, happyTimer:0,
    eventTimer:14, banner:null,
    particles:[], popups:[],
    shake:0,
    best:+(localStorage.getItem('missionMikeBestScore')||0),
    muted:localStorage.getItem('missionMikeMuted')==='1',
  };
}
state = newState();

const comboMult = () => Math.min(4, 1 + 0.5*state.comboCount);
const happyMult = () => state.happyTimer>0 ? 1.5 : 1;
const difficulty = () => 1 + state.t/45;          // grows over a run

/* ---------- 5. audio (WebAudio, lazy, gesture-gated) ------------------ */
let actx=null, musicTimer=null, musicStep=0;
function initAudio(){
  if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; } }
  if(actx && actx.state==='suspended') actx.resume();
}
function tone(freq,dur,type='square',vol=0.07,slideTo=null){
  if(state.muted||!actx) return;
  const o=actx.createOscillator(), g=actx.createGain(), t=actx.currentTime;
  o.type=type; o.frequency.setValueAtTime(freq,t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(40,slideTo),t+dur);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g).connect(actx.destination); o.start(t); o.stop(t+dur+0.02);
}
function noiseBurst(dur,vol=0.08){
  if(state.muted||!actx) return;
  const n=Math.floor(actx.sampleRate*dur), buf=actx.createBuffer(1,n,actx.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const src=actx.createBufferSource(), g=actx.createGain();
  src.buffer=buf; g.gain.value=vol; src.connect(g).connect(actx.destination); src.start();
}
const sfx = {
  make(){ tone(520,0.08,'square',0.06); },
  serve(){ tone(660,0.07,'square',0.07); setTimeout(()=>tone(880,0.10,'square',0.07),70); },
  combo(){ tone(784,0.06,'triangle',0.07); setTimeout(()=>tone(1046,0.09,'triangle',0.07),60); },
  beer(){ tone(1200,0.04,'square',0.04); setTimeout(()=>tone(900,0.05,'square',0.04),50); },
  sizzle(){ noiseBurst(0.18,0.05); },
  coffee(){ tone(300,0.18,'sawtooth',0.05,620); },
  water(){ tone(700,0.12,'sine',0.05,420); },
  dog(){ tone(420,0.07,'square',0.06); setTimeout(()=>tone(560,0.07,'square',0.06),70); },
  toast(){ tone(523,0.1,'square',0.06); setTimeout(()=>tone(659,0.1,'square',0.06),100); setTimeout(()=>tone(784,0.16,'square',0.06),200); },
  angry(){ tone(180,0.22,'sawtooth',0.06,120); },
  fall(){ noiseBurst(0.4,0.12); tone(140,0.5,'sawtooth',0.08,50); },
  event(){ tone(440,0.08,'square',0.06); setTimeout(()=>tone(587,0.12,'square',0.06),90); },
};
// simple looping chiptune
const BASS = [110,110,146,110, 130,130,98,130];
const ARP  = [440,554,659,554, 392,494,587,494];
function startMusic(){
  stopMusic();
  musicStep=0;
  musicTimer=setInterval(()=>{
    if(state.muted || state.phase!=='playing' || !actx) return;
    const s=musicStep%8;
    tone(BASS[s],0.18,'triangle',0.045);
    if(s%2===0) tone(ARP[s],0.12,'square',0.025);
    musicStep++;
  },225);
}
function stopMusic(){ if(musicTimer){ clearInterval(musicTimer); musicTimer=null; } }

/* ---------- 6. spawning & juice helpers ------------------------------- */
function popup(text,x,y,color='#fff'){ state.popups.push({text,x,y,life:1.0,color}); }
function confetti(x,y,n=14){
  const cols=['#f4c430','#4caf50','#2f6fd0','#e3a06a','#b5402f','#ffffff','#ff8ad8'];
  for(let i=0;i<n;i++) state.particles.push({
    x,y, vx:rand(-50,50), vy:rand(-90,-20), life:rand(0.5,1.0),
    color:cols[(Math.random()*cols.length)|0], sz:rand(1.5,3.2),
  });
}
function addShake(a){ state.shake=Math.min(8,state.shake+a); }
function setBanner(text,t=2.6){ state.banner={text,life:t,max:t}; sfx.event(); }

function freeSeat(){ const used=new Set(state.guests.map(g=>g.seat)); for(let i=0;i<SEATS.length;i++) if(!used.has(i)) return i; return -1; }
function spawnGuest(opts={}){
  const seat=freeSeat(); if(seat<0) return;
  const buddy = opts.buddy || (!opts.want && Math.random()<0.18);
  const pat = opts.patience || clamp(11 - difficulty()*0.9, 5, 11);
  state.guests.push({
    seat, x:SEATS[seat].x, y:SEATS[seat].y,
    want: buddy?null:(Math.random()<0.5?'burger':'hotdog'),
    patience:pat, patienceMax:pat,
    buddy, buddyTimer: buddy?rand(3.5,5.5):0,
    shirt: ['#c0504d','#9b59b6','#16a085','#e08e0b','#22cc77','#d2649a'][(Math.random()*6)|0],
    hair:  ['#2b1a10','#4a2f1c','#7a5a3a','#101010'][(Math.random()*4)|0],
    leaving:0,
  });
}

/* ---------- 7. input -------------------------------------------------- */
function toLogical(e){
  const r=canvas.getBoundingClientRect();
  const cx=(e.touches?e.touches[0].clientX:e.clientX);
  const cy=(e.touches?e.touches[0].clientY:e.clientY);
  return { x:(cx-r.left)*(W/r.width), y:(cy-r.top)*(H/r.height) };
}
function muteHit(x,y){ return x>W-28 && y<24; }

function onDown(x,y){
  initAudio();
  if(muteHit(x,y)){ toggleMute(); return; }
  if(state.phase==='menu' || state.phase==='gameover'){ startGame(); return; }
  if(state.minigame){ minigameAction(true); return; }

  // dog first (it's a tappable target)
  if(state.dog && dist(x,y,state.dog.x,state.dog.y)<22){ shooDog(); return; }
  // guest?
  for(const g of state.guests){ if(g.leaving) continue; if(dist(x,y,g.x,g.y-10)<24){ state.target={kind:'guest',ref:g}; return; } }
  // station?
  for(const st of STATIONS){ if(dist(x,y,st.x,st.y)<24){ state.target={kind:'station',ref:st}; return; } }
  // free move
  state.target={kind:'move', x:clamp(x,12,W-12), y:clamp(y,PLAY_TOP+30,H-8)};
}
function onUp(){ if(state.minigame) minigameAction(false); }

canvas.addEventListener('mousedown', e=>{ e.preventDefault(); const p=toLogical(e); onDown(p.x,p.y); });
canvas.addEventListener('mouseup',   e=>{ e.preventDefault(); onUp(); });
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); const p=toLogical(e); onDown(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchend',  e=>{ e.preventDefault(); onUp(); }, {passive:false});

window.addEventListener('keydown', e=>{
  if(e.repeat){ if(e.code==='Space') e.preventDefault(); return; }
  if(e.code==='Space'||e.code==='Enter'){
    e.preventDefault(); initAudio();
    if(state.phase!=='playing'){ startGame(); return; }
    if(state.minigame) minigameAction(true);
  } else if(e.key==='e'||e.key==='E'){ eatCarried(); }
  else if(e.key==='m'||e.key==='M'){ toggleMute(); }
});
window.addEventListener('keyup', e=>{ if(e.code==='Space' && state.minigame) minigameAction(false); });

function toggleMute(){ state.muted=!state.muted; localStorage.setItem('missionMikeMuted', state.muted?'1':'0'); if(!state.muted) initAudio(); }

/* ---------- 8. minigames ---------------------------------------------- */
function startMinigame(food /* 'burger' | 'hotdog' | null=party */){
  const d=difficulty();
  if(food==='burger'){
    const hw=clamp(0.13 - d*0.006, 0.06, 0.13);
    state.minigame={ type:'timing', food, pos:0, dir:1, speed:0.8+d*0.09, green:[0.5-hw,0.5+hw], life:0 };
  } else if(food==='hotdog'){
    state.minigame={ type:'hold', food, fill:0, holding:false, started:false, rate:0.42+d*0.04, green:[0.62,0.86], life:0 };
  } else {
    state.minigame={ type:'mash', fill:0, time:clamp(3.2-d*0.12,1.8,3.2), life:0 };
  }
}
function minigameAction(down){
  const mg=state.minigame; if(!mg) return;
  if(mg.type==='timing'){ if(down) finishTiming(); }
  else if(mg.type==='hold'){
    if(down){ mg.holding=true; mg.started=true; }
    else if(mg.holding){ mg.holding=false; finishHold(); }
  }
  else if(mg.type==='mash'){
    if(down){
      const jt=jitter(state.drunk);
      mg.fill += 0.11 * (1 - jt*0.5*Math.random());
      sfx.make();
      confetti(W/2, H-30, 2);
      if(mg.fill>=1) finishMash();
    }
  }
}
function updateMinigame(dt){
  const mg=state.minigame; if(!mg) return;
  mg.life+=dt; const jt=jitter(state.drunk);
  if(mg.type==='timing'){
    mg.pos += mg.dir*mg.speed*dt*(1 + (Math.random()*2-1)*jt);
    if(mg.pos>1){ mg.pos=1; mg.dir=-1; } if(mg.pos<0){ mg.pos=0; mg.dir=1; }
    if(mg.life>9) endFood(false, mg.food);
  } else if(mg.type==='hold'){
    if(mg.holding){ mg.fill += mg.rate*dt*(1 + (Math.random()*2-1)*jt*0.6); if(mg.fill>=1) endFood(false, mg.food); }
    if(mg.life>9 && !mg.started) endFood(false, mg.food);
  } else if(mg.type==='mash'){
    mg.time-=dt; if(mg.time<=0) finishMash();
  }
}
function finishTiming(){ const mg=state.minigame; endFood(mg.pos>=mg.green[0] && mg.pos<=mg.green[1], mg.food); }
function finishHold(){ const mg=state.minigame; endFood(mg.fill>=mg.green[0] && mg.fill<=mg.green[1], mg.food); }
function endFood(ok, food){
  state.minigame=null;
  if(ok){
    state.mike.carrying={type:food};
    addScore(CFG.pts.make, false);
    bumpCombo();
    popup('+'+CFG.pts.make, state.mike.x, state.mike.y-34, '#9f9');
    confetti(state.mike.x, state.mike.y-30, 8); sfx.sizzle(); sfx.make();
  } else {
    state.comboCount=0;
    popup('BURNT!', state.mike.x, state.mike.y-34, '#f66');
    addShake(3); sfx.angry();
  }
}
function finishMash(){
  const mg=state.minigame; const ratio=clamp(mg.fill,0,1); state.minigame=null;
  const pts=addScore(Math.round(CFG.pts.party*ratio), true);   // scale once (drunk/combo/happy)
  if(ratio>0.6){ bumpCombo(); state.tasksDone++; popup('PARTY +'+pts, state.mike.x, state.mike.y-36, '#fd6'); confetti(state.mike.x, state.mike.y-30, 22); sfx.toast(); }
  else { popup('+'+pts, state.mike.x, state.mike.y-34, '#fd6'); sfx.make(); }
}

/* ---------- 9. scoring & actions -------------------------------------- */
function addScore(base, scaled){
  const pts = scaled ? Math.round(base*drunkMult(state.drunk)*comboMult()*happyMult()) : base;
  state.score += pts; return pts;
}
function bumpCombo(){ state.comboCount=Math.min(8,state.comboCount+1); state.comboTimer=CFG.comboWindow; if(state.comboCount>=2){ sfx.combo(); popup('COMBO x'+comboMult().toFixed(1).replace('.0',''), state.mike.x, state.mike.y-48, '#ff6'); } }

function eatCarried(){
  if(state.phase!=='playing' || !state.mike.carrying) return;
  state.drunk=clamp(state.drunk-CFG.sober.eat,0,100);
  popup('ate it -'+CFG.sober.eat, state.mike.x, state.mike.y-34, '#9cf');
  state.mike.carrying=null; state.comboCount=0; sfx.make();
}

function resolveArrival(){
  const tgt=state.target; if(!tgt) return; const m=state.mike;
  if(tgt.kind==='move'){ state.target=null; return; }

  if(tgt.kind==='station'){
    const st=tgt.ref; state.target=null;
    if(st.id==='grill'||st.id==='hotdog'){
      if(m.carrying){ popup('hands full!', m.x, m.y-34, '#fc8'); return; }
      startMinigame(st.id==='grill'?'burger':'hotdog');
    } else if(st.id==='party'){
      startMinigame(null);
    } else if(st.id==='coffee'){
      if(state.coffeeCD>0){ popup('brewing...', m.x, m.y-34, '#fc8'); return; }
      state.drunk=clamp(state.drunk-CFG.sober.coffee,0,100); state.coffeeCD=CFG.coffeeCD;
      popup('coffee -'+CFG.sober.coffee, m.x, m.y-34, '#caa'); sfx.coffee();
    } else if(st.id==='fridge'){
      state.drunk=clamp(state.drunk-CFG.sober.water,0,100);
      popup('water -'+CFG.sober.water, m.x, m.y-34, '#9cf'); sfx.water();
    } else if(st.id==='keg'){
      const pts=addScore(CFG.pts.beerRun,true); state.drunk=clamp(state.drunk+12,0,100);
      popup('+'+pts+' / +beer', m.x, m.y-34, '#fd6'); sfx.beer();
    }
    return;
  }

  if(tgt.kind==='guest'){
    const g=tgt.ref; state.target=null;
    if(g.leaving || !state.guests.includes(g)) return;   // guest left while Mike was en route
    if(g.buddy){                                  // the enabler: hands Mike a beer
      giveBuddyBeer(g); return;
    }
    if(m.carrying && m.carrying.type===g.want){
      const pts=addScore(CFG.pts.serve,true); state.tasksDone++; bumpCombo();
      m.carrying=null; g.leaving=0.4;
      popup('+'+pts, g.x, g.y-30, '#9f9'); confetti(g.x, g.y-24, 18); sfx.serve();
    } else if(m.carrying){
      popup('wrong order', m.x, m.y-34, '#fc8');
    } else {
      popup('need a '+g.want, g.x, g.y-30, '#fc8');
    }
  }
}
function giveBuddyBeer(g){
  state.drunk=clamp(state.drunk+10,0,100);
  const pts=addScore(CFG.pts.toast,true);
  popup('CHEERS +'+pts, g.x, g.y-30, '#fd6'); confetti(g.x,g.y-24,10); sfx.toast();
  g.leaving=0.4;
}

/* ---------- 10. events ------------------------------------------------- */
function fireEvent(){
  const roll=['boys','crowd','dog','toast','happy'][(Math.random()*5)|0];
  if(roll==='boys'){ state.boysTimer=15; setBanner('THE BOYS SHOWED UP! 🍻'); }
  else if(roll==='crowd'){ setBanner('HUNGRY CROWD!'); for(let i=0;i<3;i++) spawnGuest({patience:clamp(8-difficulty()*0.5,4,8)}); }
  else if(roll==='dog'){ if(!state.dog){ const fromLeft=Math.random()<0.5; state.dog={ x:fromLeft?-10:W+10, y:rand(120,200), dir:fromLeft?1:-1, speed:rand(34,46) }; setBanner("DOG'S LOOSE! tap it! 🐕"); } else { state.boysTimer=12; setBanner('THE BOYS SHOWED UP! 🍻'); } }
  else if(roll==='toast'){ state.drunk=clamp(state.drunk+10,0,100); const pts=addScore(CFG.pts.toast,true); setBanner('TOAST! +'+pts+' 🥂'); sfx.toast(); }
  else if(roll==='happy'){ state.happyTimer=15; setBanner('HAPPY HOUR! x1.5 ✨'); }
}
function shooDog(){ if(!state.dog) return; const pts=addScore(CFG.pts.dog,true); popup('SHOO! +'+pts, state.dog.x, state.dog.y-16, '#9f9'); confetti(state.dog.x,state.dog.y,10); sfx.dog(); state.dog=null; }

/* ---------- 11. update loop ------------------------------------------- */
function update(dt){
  const m=state.mike; state.t+=dt;

  // timers
  state.coffeeCD=Math.max(0,state.coffeeCD-dt);
  state.boysTimer=Math.max(0,state.boysTimer-dt);
  state.happyTimer=Math.max(0,state.happyTimer-dt);
  state.comboTimer-=dt; if(state.comboTimer<=0) state.comboCount=0;
  state.shake=Math.max(0,state.shake-dt*14);
  if(state.banner){ state.banner.life-=dt; if(state.banner.life<=0) state.banner=null; }

  // passive beer (the doom clock you must manage)
  const beerEvery = (state.boysTimer>0?0.5:1) * Math.max(4, CFG.beerInterval - difficulty()*0.45);
  state.beerTimer-=dt;
  if(state.beerTimer<=0){ state.drunk=clamp(state.drunk+CFG.beerAmt,0,100); state.beerTimer=beerEvery; popup('🍺', m.x, m.y-46, '#fd6'); sfx.beer(); }

  // movement (minigame freezes Mike at his station)
  if(!state.minigame && state.target){
    let tx,ty;
    if(state.target.kind==='move'){ tx=state.target.x; ty=state.target.y; }
    else { const r=state.target.ref; tx=r.x; ty=r.y + (state.target.kind==='guest'?-2:16); }
    m.tx=tx; m.ty=ty;
    const dx=tx-m.x, dy=ty-m.y, dd=Math.hypot(dx,dy);
    if(dd<CFG.arrive){ m.moving=false; resolveArrival(); }
    else {
      m.moving=true;
      const sp=CFG.mikeSpeed*speedFactor(state.drunk);
      const nx=dx/dd, ny=dy/dd;
      const veer=Math.sin(state.t*9)*jitter(state.drunk)*0.9;     // drunk path-veer
      m.x=clamp(m.x + (nx*sp + (-ny)*veer*sp)*dt, 10, W-10);
      m.y=clamp(m.y + (ny*sp + ( nx)*veer*sp)*dt, PLAY_TOP+30, H-6);
      m.walkPhase+=dt*sp*0.12;
      if(Math.abs(dx)>1) m.facing = dx<0?-1:1;
    }
  } else { m.moving=false; }
  // sway: more drunk = bigger lean
  m.lean=Math.sin(state.t*(3+jitter(state.drunk)*4))*jitter(state.drunk)*0.45;

  if(state.minigame) updateMinigame(dt);

  // guests
  state.guestTimer-=dt;
  if(state.guestTimer<=0){ spawnGuest(); state.guestTimer=clamp(5.0-difficulty()*0.4, 2.0, 5.0); }
  for(let i=state.guests.length-1;i>=0;i--){
    const g=state.guests[i];
    if(g.leaving>0){ g.leaving-=dt; if(g.leaving<=0) state.guests.splice(i,1); continue; }
    if(g.buddy){ g.buddyTimer-=dt; if(g.buddyTimer<=0){ giveBuddyBeer(g); } continue; }
    g.patience-=dt;
    if(g.patience<=0){ // left angry
      state.comboCount=0; state.score=Math.max(0,state.score-10);
      popup('left angry -10', g.x, g.y-30, '#f66'); sfx.angry(); state.guests.splice(i,1);
    }
  }

  // dog
  if(state.dog){
    const dog=state.dog; dog.x+=dog.dir*dog.speed*dt;
    if(dog.x< -14 || dog.x> W+14){
      if(m.carrying){ m.carrying=null; state.comboCount=0; state.score=Math.max(0,state.score-8); popup('DOG STOLE IT! -8', m.x, m.y-34, '#f66'); addShake(4); }
      state.dog=null;
    }
  }

  // event manager
  state.eventTimer-=dt;
  if(state.eventTimer<=0){ fireEvent(); state.eventTimer=clamp(17-difficulty()*1.2, 8, 17); }

  // particles & popups
  for(let i=state.particles.length-1;i>=0;i--){ const p=state.particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=240*dt; p.life-=dt; if(p.life<=0) state.particles.splice(i,1); }
  for(let i=state.popups.length-1;i>=0;i--){ const p=state.popups[i]; p.y-=22*dt; p.life-=dt; if(p.life<=0) state.popups.splice(i,1); }

  // face-plant = game over
  if(state.drunk>=100) gameOver();
}

/* ---------- 12. render ------------------------------------------------- */
const HORIZON = 74, DECK_Y = 210;

function drawScene(){
  const dark=clamp(state.t/170,0,1);
  // ---- sky ----
  const sky=ctx.createLinearGradient(0,PLAY_TOP,0,HORIZON+6);
  sky.addColorStop(0,'#86c6ea'); sky.addColorStop(1,'#ffe2b6');
  ctx.fillStyle=sky; ctx.fillRect(0,PLAY_TOP,W,HORIZON+6-PLAY_TOP);
  // sun + glow
  const sg=ctx.createRadialGradient(296,PLAY_TOP+20,2,296,PLAY_TOP+20,42);
  sg.addColorStop(0,'rgba(255,243,200,0.95)'); sg.addColorStop(1,'rgba(255,243,200,0)');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(296,PLAY_TOP+20,42,0,7); ctx.fill();
  ctx.fillStyle='#ffe27a'; ctx.beginPath(); ctx.arc(296,PLAY_TOP+20,11,0,7); ctx.fill();
  // clouds
  ctx.fillStyle='rgba(255,255,255,0.9)';
  for(const c of CLOUDS){ ctx.beginPath(); ctx.ellipse(c[0],c[1],c[2]*2.1,c[2],0,0,7); ctx.fill(); ctx.beginPath(); ctx.ellipse(c[0]+c[2],c[1]+2,c[2]*1.4,c[2]*0.8,0,0,7); ctx.fill(); }
  // ---- grass ----
  const gg=ctx.createLinearGradient(0,HORIZON,0,H);
  gg.addColorStop(0,'#7cc24f'); gg.addColorStop(1,'#599b3b');
  ctx.fillStyle=gg; ctx.fillRect(0,HORIZON,W,H-HORIZON);
  // tree line (back boundary)
  for(let x=-6;x<W+24;x+=27) emoji('🌳', x, HORIZON-8, 36);
  // flowers
  for(const f of FLOWERS) emoji('🌷', f[0], f[1], 15);
  // ---- deck (patio) ----
  const dg=ctx.createLinearGradient(0,DECK_Y,0,H);
  dg.addColorStop(0,'#caa06a'); dg.addColorStop(1,'#a87c48');
  ctx.fillStyle=dg; ctx.fillRect(0,DECK_Y,W,H-DECK_Y);
  ctx.fillStyle='rgba(255,255,255,0.14)'; ctx.fillRect(0,DECK_Y,W,2);
  ctx.strokeStyle='rgba(120,85,45,0.45)'; ctx.lineWidth=1;
  for(let i=1;i<=6;i++){ ctx.beginPath(); ctx.moveTo(0,DECK_Y+i*14); ctx.lineTo(W,DECK_Y+i*14); ctx.stroke(); }
  for(let x=60;x<W;x+=84){ ctx.beginPath(); ctx.moveTo(x,DECK_Y); ctx.lineTo(x,H); ctx.stroke(); }
  // ---- string lights ----
  ctx.strokeStyle='rgba(60,50,35,0.55)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,PLAY_TOP+5); ctx.quadraticCurveTo(W/2,PLAY_TOP+20,W,PLAY_TOP+5); ctx.stroke();
  const BULB=['#ffd86b','#ff8a5b','#7be0ff','#9bff7b','#ff7bd5'];
  for(let i=0;i<=11;i++){ const tt=i/11, bx=tt*W, by=PLAY_TOP+5+Math.sin(Math.PI*tt)*14+3, col=BULB[i%5];
    const glow=0.28+dark*0.7;
    const bg=ctx.createRadialGradient(bx,by,0,bx,by,8); bg.addColorStop(0,col); bg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=glow; ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(bx,by,8,0,7); ctx.fill(); ctx.globalAlpha=1;
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(bx,by,2.2,0,7); ctx.fill();
  }
  // ---- entities ----
  STATIONS.forEach(drawStation);
  for(const g of state.guests) drawGuest(g);
  if(state.dog) drawDog();
  for(const p of state.particles){ ctx.globalAlpha=clamp(p.life,0,1); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,7); ctx.fill(); }
  ctx.globalAlpha=1;
  drawMike();
  for(const p of state.popups){ ctx.globalAlpha=clamp(p.life,0,1); uiText(p.text,p.x+1,p.y+1,11,'rgba(0,0,0,0.55)','center','800'); uiText(p.text,p.x,p.y,11,p.color,'center','800'); }
  ctx.globalAlpha=1;
  // ---- dusk -> night tint + stars ----
  if(dark>0.02){ ctx.fillStyle='rgba(18,16,46,'+(dark*0.45)+')'; ctx.fillRect(0,PLAY_TOP,W,H-PLAY_TOP); }
  if(dark>0.45){ const a=(dark-0.45)/0.55; ctx.globalAlpha=a*0.85; ctx.fillStyle='#fff'; for(const s of STARS) ctx.fillRect(s[0],s[1],1.4,1.4); ctx.globalAlpha=1; }
}

function drawStation(st){
  const x=st.x,y=st.y;
  shadowEllipse(x,y+14,18,5,0.16);
  // platform
  ctx.fillStyle='rgba(255,255,255,0.16)'; rrect(x-17,y-3,34,17,6); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.12)'; rrect(x-17,y+8,34,6,6); ctx.fill();
  // icon
  emoji(SICON[st.id], x, y+1, 30);
  // label pill
  ctx.fillStyle='rgba(18,14,26,0.82)'; rrect(x-17,y+15,34,12,6); ctx.fill();
  uiText(st.name, x, y+24, 7, '#f0ead8','center','800');
  if(st.id==='coffee' && state.coffeeCD>0){ ctx.fillStyle='rgba(0,0,0,0.45)'; rrect(x-17,y-12,34,24,6); ctx.fill(); uiText(Math.ceil(state.coffeeCD)+'', x, y+5, 13,'#fff','center','800'); }
}

function drawGuest(g){
  const x=g.x,y=g.y;
  shadowEllipse(x,y+8,12,3.5,0.16);
  // chair
  ctx.fillStyle='#7a5630'; rrect(x-12,y-16,24,5,2); ctx.fill();
  ctx.fillStyle='#6e4a28'; rrect(x-12,y-2,24,6,2); ctx.fill();
  ctx.fillStyle='#553a20'; ctx.fillRect(x-11,y+3,3,10); ctx.fillRect(x+8,y+3,3,10);
  // person
  emoji(faceFor(g), x, y-13, 27);
  // speech bubble
  const bx=x, by=y-36;
  ctx.fillStyle='#ffffff'; rrect(bx-16,by-13,32,25,8); ctx.fill();
  ctx.beginPath(); ctx.moveTo(bx-5,by+10); ctx.lineTo(bx+6,by+10); ctx.lineTo(bx,by+16); ctx.closePath(); ctx.fill();
  if(g.buddy){ emoji('🍺', bx, by-1, 20); return; }
  emoji(ITEM[g.want], bx, by-2, 19);
  // patience bar
  const frac=clamp(g.patience/g.patienceMax,0,1);
  ctx.fillStyle='rgba(0,0,0,0.16)'; rrect(bx-13,by-12,26,4,2); ctx.fill();
  ctx.fillStyle = frac>0.5?'#3fc463':frac>0.25?'#f4c430':'#e0473a'; rrect(bx-13,by-12,26*frac,4,2); ctx.fill();
}

function drawDog(){
  const d=state.dog;
  shadowEllipse(d.x,d.y+9,12,3.5,0.16);
  ctx.save(); ctx.translate(d.x,d.y); if(d.dir<0) ctx.scale(-1,1);
  emoji('🐕',0,0,26); ctx.restore();
}

// Mike, drawn from vector shapes so he can have brown hair + a brown GOATEE
// (no full-beard emoji). Feet sit at the origin; the figure is built upward.
const HAIR='#5e3d20', SKIN='#ecb088', SKIN_SH='#d59a6e', TANK='#f2f2ee', JEANS='#37445e', SHOE='#2a2a30';
function drawMikeFigure(s){
  const P=v=>v*s;
  // legs
  ctx.fillStyle=JEANS;
  rrect(P(-6),P(-10),P(5),P(10),P(2)); ctx.fill();
  rrect(P(1),P(-10),P(5),P(10),P(2)); ctx.fill();
  // shoes
  ctx.fillStyle=SHOE;
  rrect(P(-7.5),P(-3),P(6.5),P(3),P(1.5)); ctx.fill();
  rrect(P(1),P(-3),P(6.5),P(3),P(1.5)); ctx.fill();
  // bare arms (sleeveless tank) + hands
  ctx.fillStyle=SKIN;
  rrect(P(-12.5),P(-23),P(4),P(12),P(2)); ctx.fill();
  rrect(P(8.5),P(-23),P(4),P(12),P(2)); ctx.fill();
  ctx.beginPath(); ctx.arc(P(-10.5),P(-11),P(2.3),0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(P(10.5),P(-11),P(2.3),0,7); ctx.fill();
  // bare torso/shoulders showing under the tank
  rrect(P(-9),P(-24),P(18),P(15),P(4)); ctx.fill();
  // white wife-beater: narrow body + shoulder straps (skin shows at shoulders/chest V)
  ctx.fillStyle=TANK;
  rrect(P(-7),P(-22.5),P(14),P(13.5),P(3)); ctx.fill();
  rrect(P(-5.6),P(-24),P(2.6),P(4),P(1)); ctx.fill();
  rrect(P(3),P(-24),P(2.6),P(4),P(1)); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.07)'; rrect(P(3),P(-22.5),P(4),P(13.5),P(3)); ctx.fill();
  // ketchup (red) + mustard (yellow) stains
  ctx.fillStyle='#c0392b';
  ctx.beginPath(); ctx.arc(P(-3),P(-16),P(2.3),0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(P(-1.2),P(-14),P(1.4),0,7); ctx.fill();
  ctx.fillStyle='#e6a90a';
  ctx.beginPath(); ctx.arc(P(3.2),P(-13),P(2),0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(P(1.6),P(-15.2),P(1.1),0,7); ctx.fill();
  // neck
  ctx.fillStyle=SKIN_SH; rrect(P(-2.5),P(-25),P(5),P(3),P(1)); ctx.fill();
  // face
  ctx.fillStyle=SKIN; ctx.beginPath(); ctx.arc(P(0),P(-29.5),P(7.3),0,7); ctx.fill();
  // brown hair on top only - natural hairline, no cap, no sideburns
  ctx.fillStyle=HAIR;
  ctx.beginPath();
  ctx.arc(P(0),P(-29.5),P(7.6),Math.PI*1.15,Math.PI*1.85,false);
  ctx.lineTo(P(4.2),P(-31)); ctx.lineTo(P(-4.2),P(-31)); ctx.closePath(); ctx.fill();
  // eyes
  ctx.fillStyle='#241a16';
  ctx.beginPath(); ctx.arc(P(-2.6),P(-29.6),P(1),0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(P(2.6),P(-29.6),P(1),0,7); ctx.fill();
  // trimmed brown goatee: small mustache + compact chin patch (cheeks bare)
  ctx.fillStyle=HAIR;
  rrect(P(-2.4),P(-26.6),P(4.8),P(1.4),P(0.7)); ctx.fill();
  rrect(P(-1.8),P(-23.8),P(3.6),P(2.8),P(1.2)); ctx.fill();
}
function drawMike(){
  const m=state.mike;
  const bob = m.moving ? Math.abs(Math.sin(m.walkPhase*Math.PI*2))*2 : 0;
  if(state.phase!=='gameover') shadowEllipse(m.x,m.y,13,4,0.20);
  ctx.save();
  ctx.translate(m.x, m.y-bob);
  if(state.phase==='gameover'){ ctx.rotate(Math.PI/2*0.9); }
  else ctx.rotate(m.lean*0.4);
  if(m.facing<0) ctx.scale(-1,1);
  drawMikeFigure(1);
  ctx.restore();
  if(m.carrying) emoji(ITEM[m.carrying.type], m.x + (m.facing<0?-15:15), m.y-30-bob, 18);
  if(state.phase==='gameover'){ uiText('💤', m.x+18, m.y-28, 14,'#fff','left','700'); }
}

function drawHUD(){
  // top bar
  const grad=ctx.createLinearGradient(0,0,0,PLAY_TOP); grad.addColorStop(0,'#1b1726'); grad.addColorStop(1,'#13101b');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,PLAY_TOP);
  ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fillRect(0,PLAY_TOP-1,W,1);
  // drunk meter
  const mx=10,my=9,mw=150,mh=12;
  ctx.fillStyle='#0c0a12'; rrect(mx-2,my-2,mw+4,mh+4,7); ctx.fill();
  ctx.save(); rrect(mx,my,mw,mh,6); ctx.clip();
  const zg=ctx.createLinearGradient(mx,0,mx+mw,0);
  zg.addColorStop(0,'#5a6072'); zg.addColorStop(0.399,'#5a6072');
  zg.addColorStop(0.40,'#36a84e'); zg.addColorStop(0.749,'#36a84e');
  zg.addColorStop(0.75,'#c4423a'); zg.addColorStop(1,'#c4423a');
  ctx.fillStyle=zg; ctx.fillRect(mx,my,mw,mh);
  const fw=mw*clamp(state.drunk/100,0,1);
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(mx+fw,my,mw-fw,mh);
  ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(mx,my,mw,mh*0.42);
  ctx.restore();
  ctx.fillStyle='#fff'; ctx.fillRect(mx+fw-1,my-3,2,mh+6);
  const bd=band(state.drunk), bc=bd==='tipsy'?'#7CFC98':bd==='hammered'?'#ff8a6a':bd==='out'?'#ff4a3a':'#aeb2c2';
  uiText('DRUNK', mx, my-3, 7,'#8a8ea0','left','800');
  uiText(bd.toUpperCase()+(bd==='tipsy'?'  •  THE ZONE':''), mx+34, my-3, 7, bc,'left','800');
  // mult + combo
  const dm=drunkMult(state.drunk);
  uiText('×'+dm.toFixed(1)+' pts', mx, my+mh+9, 8, dm>1.5?'#ffd86b':'#c9ac74','left','800');
  let cx2=mx+58;
  if(state.comboCount>=1){ uiText('COMBO ×'+comboMult().toFixed(1).replace('.0',''), cx2, my+mh+9, 8,'#7CFC98','left','800'); cx2+=72; }
  if(state.happyTimer>0){ uiText('HAPPY HOUR', cx2, my+mh+9, 8,'#ff8ad8','left','800'); }
  // score / best
  uiText(String(state.score).padStart(5,'0'), W-36, 16, 15,'#fff','right','800');
  uiText('BEST '+state.best, W-36, 26, 7,'#8a8ea0','right','700');
  // mute
  emoji(state.muted?'🔇':'🔊', W-15, 13, 15);
}

function drawMinigamePanel(){
  const mg=state.minigame; if(!mg) return;
  const jt=jitter(state.drunk), sx=(Math.random()*2-1)*jt*2.5, sy=(Math.random()*2-1)*jt*2.5;
  const bw=196, bx=W/2-bw/2+sx, by=H-44+sy, bh=14;
  ctx.fillStyle='rgba(12,10,18,0.88)'; rrect(bx-10,by-20,bw+20,bh+30,9); ctx.fill();
  let label='';
  if(mg.type==='timing') label='STOP IN THE GREEN';
  else if(mg.type==='hold') label= mg.started?'RELEASE IN THE GREEN':'HOLD to grill';
  else label='MASH!   '+mg.time.toFixed(1)+'s';
  uiText(label, W/2, by-7, 9,'#fff','center','800');
  // track
  ctx.fillStyle='#23202c'; rrect(bx,by,bw,bh,5); ctx.fill();
  if(mg.type==='timing'){
    ctx.fillStyle='#3fae46'; rrect(bx+bw*mg.green[0],by,bw*(mg.green[1]-mg.green[0]),bh,3); ctx.fill();
    ctx.fillStyle='#fff'; rrect(bx+bw*mg.pos-2,by-3,4,bh+6,2); ctx.fill();
  } else if(mg.type==='hold'){
    ctx.fillStyle='#3fae46'; rrect(bx+bw*mg.green[0],by,bw*(mg.green[1]-mg.green[0]),bh,3); ctx.fill();
    ctx.fillStyle= mg.fill>mg.green[1]?'#e0473a':'#f4c430'; rrect(bx,by,bw*clamp(mg.fill,0,1),bh,4); ctx.fill();
  } else {
    const gr=ctx.createLinearGradient(bx,0,bx+bw,0); gr.addColorStop(0,'#f4c430'); gr.addColorStop(1,'#ff8a5b');
    ctx.fillStyle=gr; rrect(bx,by,bw*clamp(mg.fill,0,1),bh,4); ctx.fill();
  }
}

function drawBanner(){
  if(!state.banner) return; const b=state.banner;
  ctx.globalAlpha=clamp(b.life,0,1);
  ctx.fillStyle='rgba(20,16,30,0.86)'; rrect(W/2-104,PLAY_TOP+6,208,22,9); ctx.fill();
  ctx.fillStyle='rgba(255,216,107,0.5)'; rrect(W/2-104,PLAY_TOP+6,208,2,2); ctx.fill();
  uiText(b.text, W/2, PLAY_TOP+21, 12,'#ffd86b','center','800');
  ctx.globalAlpha=1;
}

function drawMenu(){
  ctx.fillStyle='rgba(8,6,16,0.7)'; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.translate(W/2, 108); drawMikeFigure(1.7); ctx.restore();
  uiText('MISSION MIKE', W/2, 128, 30,'#ffd86b','center','800');
  uiText('grill • serve • party • don’t face-plant', W/2, 148, 11,'#e8e2f0','center','600');
  uiText('Mike auto-drinks. Ride the GREEN tipsy band for ×2 points,', W/2, 176, 10,'#9fe0a8','center','600');
  uiText('pull back with ☕ / 💧 before he hits 100.', W/2, 192, 10,'#9cc8f0','center','600');
  uiText('click a station → carry the plate to a hungry guest', W/2, 220, 9,'#b9b3c8','center','600');
  uiText('M mute   ·   E eat your plate to sober up', W/2, 236, 9,'#b9b3c8','center','600');
  uiText('BEST  '+state.best, W/2, 260, 11,'#ffd86b','center','700');
  uiText('CLICK or SPACE to start', W/2, 284, 13,'#fff','center','800');
}

function drawGameOver(){
  ctx.fillStyle='rgba(8,6,16,0.78)'; ctx.fillRect(0,0,W,H);
  emoji('😵', W/2, 76, 52);
  uiText('MIKE FACE-PLANTED', W/2, 128, 22,'#ff6b5a','center','800');
  uiText('SCORE  '+state.score, W/2, 162, 18,'#fff','center','800');
  uiText('tasks completed: '+state.tasksDone, W/2, 184, 10,'#c9c3d6','center','600');
  uiText(state.score>=state.best?'★ NEW BEST ★':'best: '+state.best, W/2, 204, 11, state.score>=state.best?'#ffd86b':'#c9c3d6','center','800');
  uiText('CLICK or ENTER to try again', W/2, 240, 13,'#fff','center','800');
}

function render(){
  const RS = canvas.width / W;
  ctx.setTransform(RS,0,0,RS,0,0);
  ctx.imageSmoothingEnabled=true;
  ctx.clearRect(0,0,W,H);
  // world layer (screen shake + drunk wobble)
  ctx.save();
  const wob = state.phase==='playing' && state.drunk>=75 ? (state.drunk-75)/25 : 0;
  const sh=state.shake;
  ctx.translate((Math.random()*2-1)*sh + Math.sin(state.t*6)*wob*3, (Math.random()*2-1)*sh + Math.cos(state.t*5)*wob*2);
  if(wob>0) ctx.rotate(Math.sin(state.t*3)*wob*0.02);
  drawScene();
  ctx.restore();
  if(state.phase!=='menu') drawHUD();
  drawBanner();
  if(state.phase==='playing') drawMinigamePanel();
  if(state.phase==='menu') drawMenu();
  else if(state.phase==='gameover') drawGameOver();
}

/* ---------- 13. flow & loop ------------------------------------------- */
function startGame(){
  const keepBest=state.best, keepMute=state.muted;
  state=newState(); state.best=keepBest; state.muted=keepMute;
  state.phase='playing';
  initAudio(); startMusic();
}
function gameOver(){
  if(state.phase!=='playing') return;
  state.phase='gameover'; state.minigame=null; state.target=null;
  addShake(8); sfx.fall(); stopMusic();
  if(state.score>state.best){ state.best=state.score; localStorage.setItem('missionMikeBestScore', String(state.best)); }
}

let last;
function frame(ts){
  if(last===undefined) last=ts;
  let dt=(ts-last)/1000; last=ts; dt=Math.min(dt,0.05);
  if(state.phase==='playing') update(dt);
  render();
  requestAnimationFrame(frame);
}
fitCanvas();
requestAnimationFrame(frame);
</script>
